body:
  text: 重刻藥師七佛供養儀軌經序昔我佛在廣嚴城以梵音聲説藥師七佛本願功德經傅至唐特西藏王頌藏剛布譯為番文以便彼國誦習逮至國朝王輩達賴喇嘛製供養儀軌經體制尊嚴儀文周密後人如法修持內具誠懇外修節目能令解脫世間衆苦速證無上菩提益莫大焉顧西番文字華人多以未諳後見顯親王傅儀賓公工布查布所譯漢本文字允當與經旨相符惜其原板無存其中亦無布壇法儀與供養佛相方位二事謹録珍襲不敢自祕久欲公之大衆因力未逮以致稽遲今逢大檀越宗室祐容齋少宰見刻此經指示添繪壇儀各方位佛相與三十五佛之相及救度佛母二十一相並以寫梵天文字數𭛜尤為莊重復有檀越理藩院正郎定君聞此刻經欣然共濟既得二大檀越偶善捐資贊成斯舉什遂將譯成漢文諸品經數卷凡諸佛號悉書二體字同付剞劂裝成卷帙期傳不朽奉諸蘭若分諸信士凡我同志共步善因是役也不輕豫之夙願克完而諸善友之財施即法施也不可不為志之因為之序云時大清道光歲次甲申嘉平月吉日淨住寺住持特授盛京實勝寺掌印喇嘛阿旺查什書
